services:

  # SQL Server Database
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Creates the TUCompass database once SQL Server is healthy
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db:
        condition: service_healthy
    entrypoint: >
      /bin/bash -c "
      /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P 'YourStrong@Passw0rd' -C -Q \"IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'TUCompass') CREATE DATABASE TUCompass\" &&
      echo 'Database TUCompass is ready!'
      "

  # Spring Boot App
  app:
    image: tu-compass-app
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://db:1433;databaseName=TUCompass;encrypt=true;trustServerCertificate=true;useUnicode=true;characterEncoding=UTF-8
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=YourStrong@Passw0rd
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

volumes:
  mssql-data: